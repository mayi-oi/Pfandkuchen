            <div class="Phishing">
                <!-- <img src="Res/Bild/Logo/pfp-weiß.png" alt="Cool Logo"> -->
                <h2>Hey willkommen zurück! :D</h2>

                <div class="anmelden-form">
                    <form onsubmit="event.preventDefault(); showFakeDB();">
                        <div class="a-form">
                            <label for="username">Nutzername</label>
                            <input type="text" id="username" placeholder="Jason_3224" required minlength="7">

                            <label for="Passwort">Passwort</label>
                            <input type="password" id="passwort" placeholder="Johndoe@.net" required minlength="4">

                    <p>Nutzername: <span id="user"></span></p>
                    <p>Passwort: <span id="Passwort"></span></p>

                    <button onclick="closeFakeDB()">ok lol</button>
                </div>
            </div>
        </div>
    <script>
        function toggleNav() {
            document.getElementById('nav-menu').classList.toggle('show');
        }
        document.addEventListener('click', function(e) {
            const nav = document.querySelector('.Navdiv');
            if (!nav.contains(e.target)) {
                document.getElementById('nav-menu').classList.remove('show');
            }
        });

         function showFakeDB() {
            const user = document.getElementById('username').value;
            const password = document.getElementById('passwort').value;

            document.getElementById('Hackzeit').innerText = new Date().toLocaleString();
            document.getElementById('user').innerText = user;
            document.getElementById('Passwort').innerText = password;
            document.getElementById('Fake-datebase').style.display = 'block';
        }

        function closeFakeDB() {
            document.getElementById('Fake-datebase').style.display = 'none';
        }
    </script>
